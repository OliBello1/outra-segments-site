<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Outra × Purplebricks — ROI Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; }
  #gate {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #F0EFF5 0%, #EDE9F3 50%, #F0EFF5 100%);
    padding: 20px;
  }
  #gate::before {
    content: ''; position: fixed; top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(138,45,135,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .gate-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(45,50,80,0.08);
    border-radius: 20px; padding: 48px 40px;
    max-width: 400px; width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    animation: fadeSlide 0.6s ease both;
  }
  .gate-logos {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-bottom: 32px;
  }
  .gate-logos img.outra-logo { height: 22px; width: auto; display: block; }
  .gate-logos img.pb-logo { height: 28px; width: auto; display: block; }
  .gate-logos .divider { width: 1px; height: 26px; background: rgba(45,50,80,0.14); flex-shrink: 0; }
  .gate-title {
    font-size: 14px; font-weight: 600; color: #8e8ea0;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .gate-subtitle {
    font-size: 13px; color: #8e8ea0; font-weight: 500;
    margin-bottom: 28px; line-height: 1.5;
  }
  .gate-input-wrap {
    display: flex; align-items: center;
    background: #fff; border: 1.5px solid rgba(45,50,80,0.1);
    border-radius: 12px; overflow: hidden;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .gate-input-wrap:focus-within {
    border-color: #4D61F4;
    box-shadow: 0 0 0 4px rgba(77,97,244,0.06);
  }
  .gate-input-wrap input {
    flex: 1; border: none; outline: none;
    padding: 16px 18px; font-size: 15px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600; color: #131417;
    background: transparent;
  }
  .gate-input-wrap input::placeholder { color: #c4c4d0; font-weight: 500; }
  .gate-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #4D61F4, #8A2D87);
    color: #fff; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700;
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .gate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(77,97,244,0.25); }
  .gate-btn:active { transform: translateY(0); }
  .gate-error {
    color: #e85d7a; font-size: 12px; font-weight: 600;
    margin-top: 12px; opacity: 0;
    transition: opacity 0.2s;
  }
  .gate-error.show { opacity: 1; }
  .gate-footer {
    margin-top: 24px; font-size: 10px; color: #c4c4d0;
    letter-spacing: 0.3px;
  }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>

function _h(s){return new Uint8Array(s.match(/.{2}/g).map(function(b){return parseInt(b,16)}))}

async function unlock(){
  var pw=document.getElementById('pw').value;
  try{
    var salt=_h(_S),iv=_h(_I);
    var raw=atob(_C);
    var ct=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)ct[i]=raw.charCodeAt(i);
    var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    var dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    var html=new TextDecoder().decode(dec);
    document.getElementById('gate').style.display='none';
    document.body.insertAdjacentHTML('beforeend',html);
    sessionStorage.setItem('pbroi_k',pw);
    bootApp();
  }catch(e){
    document.getElementById('err').classList.add('show');
    document.getElementById('pw').value='';
    setTimeout(function(){document.getElementById('err').classList.remove('show')},3000);
  }
}

function bootApp(){
  var s1=document.createElement('script');
  s1.crossOrigin='';
  s1.src='https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.crossOrigin='';
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js';
    s2.onload=function(){
      var s3=document.createElement('script');
      s3.crossOrigin='';
      s3.src='https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js';
      s3.onload=function(){
        var el=document.getElementById('app-source');
        if(el){
          var appScript=document.createElement('script');
          appScript.type='text/babel';
          appScript.setAttribute('data-type','module');
          appScript.textContent=el.textContent;
          document.body.appendChild(appScript);
          setTimeout(function(){Babel.transformScriptTags()},50);
        }
      };
      document.head.appendChild(s3);
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pw').addEventListener('keydown',function(e){
    if(e.key==='Enter')unlock();
  });
  var cached=sessionStorage.getItem('pbroi_k');
  if(cached){
    document.getElementById('pw').value=cached;
    unlock();
  }
});
