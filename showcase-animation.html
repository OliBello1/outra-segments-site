<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outra Signature Audiences — Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --outra-blue: #4D61F4;
  --outra-blue-light: #9FAAFF;
  --outra-navy: #0A135B;
  --purple: #CB88FF;
  --green: #C2FE97;
  --orange: #FB861A;
  --yellow: #FFEB00;
  --teal: #4CDCC7;
  --text: #131417;
  --text-secondary: #555568;
  --text-muted: #8e8ea0;
  --surface: #ffffff;
  --bg-warm: #F6F5F1;
  --bg-cool: #F7F9FF;
  --border: rgba(45,50,80,0.08);
  --border-strong: rgba(45,50,80,0.14);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* ── CAROUSEL TRACK ── */
.carousel-viewport {
  width: 100vw;
  overflow: hidden;
  padding: 20px 0;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
}
.carousel-track {
  display: flex;
  gap: 20px;
  animation: carousel-scroll 30s linear infinite;
  width: max-content;
  will-change: transform;
}
@keyframes carousel-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── CARD (exact copy from live site) ── */
.card-wrapper {
  height: 461px;
  width: 280px;
  flex-shrink: 0;
  cursor: default;
  position: relative;
}
.card-activate-btn {
  position: absolute;
  top: 20px;
  right: 10px;
  z-index: 4;
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
  padding: 5px 12px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
}
.card-activate-btn.lifestage  { background: var(--outra-blue); color: white; }
.card-activate-btn.household  { background: var(--teal); color: white; }
.card-activate-btn.purchasing { background: var(--orange); color: white; }
.card-activate-btn.homemovers { background: var(--orange); color: white; }
.card-activate-btn.lifestyle  { background: var(--purple); color: white; }

.card-front {
  width: 100%;
  height: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-top-stripe {
  height: 6px;
  flex-shrink: 0;
}
.card-top-stripe.lifestage  { background: linear-gradient(90deg, var(--outra-blue), var(--outra-blue-light)); }
.card-top-stripe.household  { background: linear-gradient(90deg, var(--teal), #BAEFE7); }
.card-top-stripe.purchasing { background: linear-gradient(90deg, var(--orange), #FDB861); }
.card-top-stripe.homemovers { background: linear-gradient(90deg, var(--orange), #FDB861); }
.card-top-stripe.lifestyle  { background: linear-gradient(90deg, var(--purple), #E0B8FF); }

.card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 24px 22px 20px;
}
.card-cat-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.card-cat-tag.lifestage  { color: var(--outra-blue); }
.card-cat-tag.household  { color: #2bb5a0; }
.card-cat-tag.purchasing { color: var(--orange); }
.card-cat-tag.homemovers { color: var(--orange); }
.card-cat-tag.lifestyle  { color: #a855f7; }

.card-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
  line-height: 1.25;
  margin-bottom: auto;
  padding-right: 76px;
}

/* Card image — exact match */
.card-image-wrap {
  height: 214px;
  flex: 0 0 214px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px;
  position: relative;
  background: #ffffff;
  isolation: isolate;
  overflow: hidden;
}
.card-image {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  filter: contrast(1.15) brightness(1.08);
  mix-blend-mode: multiply;
}

/* See more info row */
.card-info-row {
  display: flex;
  justify-content: flex-end;
  padding: 8px 14px 6px;
  flex-shrink: 0;
}
.card-info-btn {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3px;
  padding: 4px 9px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-muted);
  text-decoration: none;
  white-space: nowrap;
}

/* Bottom bar */
.card-bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 16px 22px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.card-size-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.card-size-value {
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
}
</style>
</head>
<body>

<div class="carousel-viewport">
  <div class="carousel-track" id="track"></div>
</div>

<script>
var cards = [
  { name: "Students", cat: "lifestage", catLabel: "LIFE STAGE", size: "100k", image: "public/Students.png" },
  { name: "Predicted Move", cat: "homemovers", catLabel: "HOME MOVERS", size: "100k", image: "public/Predicted Move.png" },
  { name: "Detached", cat: "household", catLabel: "HOUSEHOLD", size: "1.9m", image: "public/Detached.png" },
  { name: "Ultra-High Purchasing Power", cat: "purchasing", catLabel: "PURCHASING POWER", size: "600k", image: "public/Ultra-High Purchasing Power.png" },
  { name: "Early Career Households", cat: "lifestage", catLabel: "LIFE STAGE", size: "200k", image: "public/Early Career Households .png" },
  { name: "Car Owner", cat: "lifestyle", catLabel: "LIFESTYLE", size: "5.5m", image: "public/Car Owner.png" },
  { name: "Families with Pre-school Children", cat: "lifestage", catLabel: "LIFE STAGE", size: "600k", image: "public/Families with Pre-school Children.png" },
  { name: "Just Moved", cat: "homemovers", catLabel: "HOME MOVERS", size: "100k", image: "public/Just Moved.png" },
  { name: "Established Professionals", cat: "lifestage", catLabel: "LIFE STAGE", size: "1.4m", image: "public/Established Professionals.png" },
  { name: "Homes with Gardens", cat: "household", catLabel: "HOUSEHOLD", size: "6.4m", image: "public/Homes with Gardens.png" },
  { name: "Blue Collar Households", cat: "lifestage", catLabel: "LIFE STAGE", size: "700k", image: "public/Blue Collar Households.png" },
  { name: "High Purchasing Power", cat: "purchasing", catLabel: "PURCHASING POWER", size: "2.4m", image: "public/High Purchasing Power.png" },
];

function buildCard(seg) {
  return '<div class="card-wrapper">' +
    '<a class="card-activate-btn ' + seg.cat + '">Activate</a>' +
    '<div class="card-front">' +
      '<div class="card-top-stripe ' + seg.cat + '"></div>' +
      '<div class="card-body">' +
        '<div class="card-cat-tag ' + seg.cat + '">' + seg.catLabel + '</div>' +
        '<div class="card-name">' + seg.name + '</div>' +
      '</div>' +
      '<div class="card-image-wrap"><img src="' + seg.image + '" alt="' + seg.name + '" class="card-image"></div>' +
      '<div class="card-info-row"><span class="card-info-btn">See more info</span></div>' +
      '<div class="card-bottom-bar">' +
        '<div class="card-size-label">Audience size</div>' +
        '<div class="card-size-value">' + seg.size + '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// Two copies for seamless loop
var track = document.getElementById('track');
var html = '';
for (var r = 0; r < 2; r++) {
  for (var i = 0; i < cards.length; i++) {
    html += buildCard(cards[i]);
  }
}
track.innerHTML = html;
</script>

</body>
</html>
